<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall — Setup</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recall">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      .card { background: #1e293b; border-color: #334155; }
      input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
      input::placeholder { color: #64748b; }
      .hint { color: #64748b; }
      .divider { color: #475569; }
      .divider::before, .divider::after { background: #334155; }
      .local-btn { background: #0f172a; border-color: #334155; color: #f1f5f9; }
      .local-btn:hover { background: #1e293b; border-color: #6366f1; }
      .local-desc { color: #64748b; }
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #6366f1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: white;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    @media (prefers-color-scheme: dark) { label { color: #cbd5e1; } }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      background: white;
      color: #1e293b;
    }

    input:focus { border-color: #6366f1; }

    .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 8px;
      margin-bottom: 20px;
    }

    .connect-btn {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .connect-btn:hover { background: #4f46e5; }
    .connect-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #94a3b8;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .local-btn {
      width: 100%;
      padding: 13px;
      background: white;
      color: #1e293b;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .local-btn:hover { border-color: #6366f1; background: #f8f7ff; }

    .local-desc {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      margin-top: 8px;
      line-height: 1.4;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">r.</div>
    <h1>Welcome to Recall</h1>
    <p class="subtitle">Choose how you'd like to use Recall.</p>

    <label for="serverInput">Connect to your server</label>
    <input
      type="url"
      id="serverInput"
      placeholder="https://recall.yourdomain.com"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
    />
    <p class="hint">Your self-hosted instance — data syncs across devices</p>

    <button class="connect-btn" id="connectBtn">Connect</button>
    <p class="error" id="errorMsg"></p>

    <div class="divider">or</div>

    <button class="local-btn" id="localBtn">Use locally on this device</button>
    <p class="local-desc">Data stays on your phone. Works completely offline. No server needed.</p>
  </div>

  <script>
    const input      = document.getElementById('serverInput');
    const connectBtn = document.getElementById('connectBtn');
    const localBtn   = document.getElementById('localBtn');
    const errorMsg   = document.getElementById('errorMsg');

    const existing = localStorage.getItem('recall_server');
    if (existing) input.value = existing;

    input.addEventListener('keydown', e => { if (e.key === 'Enter') connectBtn.click(); });

    // ── Local mode ────────────────────────────────────────────────────────
    localBtn.addEventListener('click', () => {
      localStorage.setItem('recall_mode', 'local');
      localStorage.removeItem('recall_server');
      window.location.href = '/auth.html';
    });

    // ── Server mode ───────────────────────────────────────────────────────
    connectBtn.addEventListener('click', async () => {
      errorMsg.classList.remove('show');
      let url = input.value.trim().replace(/\/$/, '');

      if (!url) {
        errorMsg.textContent = 'Please enter your server URL.';
        errorMsg.classList.add('show');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        input.value = url;
      }

      connectBtn.disabled = true;
      connectBtn.textContent = 'Connecting…';

      try {
        const res = await fetch(url + '/api/auth/me', {
          method: 'GET',
          signal: AbortSignal.timeout(8000)
        });

        if (res.status === 401 || res.ok) {
          localStorage.setItem('recall_server', url);
          localStorage.setItem('recall_mode', 'server');
          localStorage.removeItem('recall_token');
          window.location.href = '/auth.html';
        } else {
          throw new Error(`Server responded with ${res.status}`);
        }
      } catch (err) {
        if (err.name === 'TimeoutError' || err.name === 'AbortError') {
          errorMsg.textContent = 'Server not reachable. Check the URL and your connection.';
        } else if (err.message.includes('fetch') || err.message.includes('Failed')) {
          errorMsg.textContent = 'Could not connect. Is your server running and accessible?';
        } else {
          errorMsg.textContent = err.message;
        }
        errorMsg.classList.add('show');
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect';
      }
    });
  </script>
</body>
</html>
