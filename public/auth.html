<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recall">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
<div class="card">

  <!-- ── Login / Register ── -->
  <div class="view active" id="viewBrowserLogin">
    <div class="logo">recall<span>.</span></div>
    <h2 id="browserFormTitle">Welcome back</h2>
    <p class="subtitle-text" id="browserFormSubtitle">Sign in to your Recall account</p>

    <div class="error-msg" id="browserLoginError"></div>

    <form id="browserAuthForm">
      <div class="form-group">
        <label class="label-text" for="browserEmailInput">Email</label>
        <input type="email" id="browserEmailInput" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="label-text" for="browserPasswordInput">Password</label>
        <input type="password" id="browserPasswordInput" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit" id="browserSubmitBtn">Sign in</button>
    </form>

    <div class="toggle-row">
      Don't have an account? <a id="browserToggleLink">Create one</a>
    </div>
    <p class="hint-text">Your data is private and stored on this server.</p>
  </div>

</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => reg.update())
      .catch(() => {});
  }

  // ── Routing ───────────────────────────────────────────────────────────────

  // Legacy local mode (set by the retired Android app / setup page) —
  // restore the local token so existing on-device data stays reachable
  if (localStorage.getItem('recall_mode') === 'local') {
    if (!localStorage.getItem('recall_token')) {
      localStorage.setItem('recall_token', 'local-token');
      localStorage.setItem('recall_user', JSON.stringify({ id: 'local', email: 'local' }));
    }
    window.location.href = '/';
  }

  // Already logged in
  if (localStorage.getItem('recall_token')) {
    window.location.href = '/';
  }

  // ── Login form ────────────────────────────────────────────────────────────
  let isBrowserRegister = false;
  const bTitle    = document.getElementById('browserFormTitle');
  const bSubtitle = document.getElementById('browserFormSubtitle');
  const bBtn      = document.getElementById('browserSubmitBtn');
  const bToggle   = document.getElementById('browserToggleLink');
  const bError    = document.getElementById('browserLoginError');

  function setBrowserMode(reg) {
    isBrowserRegister = reg;
    bTitle.textContent    = reg ? 'Create your account' : 'Welcome back';
    bSubtitle.textContent = reg ? 'Start remembering more, forever.' : 'Sign in to your Recall account';
    bBtn.textContent      = reg ? 'Create account' : 'Sign in';
    bToggle.textContent   = reg ? 'Sign in instead' : 'Create one';
    document.getElementById('browserPasswordInput').setAttribute('autocomplete', reg ? 'new-password' : 'current-password');
    bError.classList.remove('show');
  }

  bToggle.addEventListener('click', () => setBrowserMode(!isBrowserRegister));

  document.getElementById('browserAuthForm').addEventListener('submit', async e => {
    e.preventDefault();
    bError.classList.remove('show');
    const email    = document.getElementById('browserEmailInput').value.trim();
    const password = document.getElementById('browserPasswordInput').value;
    if (!email || !password) return;

    bBtn.disabled = true;
    bBtn.textContent = isBrowserRegister ? 'Creating account…' : 'Signing in…';

    try {
      // Same-origin only — never send credentials to a stored third-party URL
      const endpoint = isBrowserRegister ? '/api/auth/register' : '/api/auth/login';
      const res  = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        bError.textContent = data.error || 'Something went wrong.';
        bError.classList.add('show');
        return;
      }
      localStorage.setItem('recall_token', data.token);
      localStorage.setItem('recall_user',  JSON.stringify(data.user));
      window.location.href = '/';
    } catch {
      bError.textContent = 'Could not reach the server. Is it running?';
      bError.classList.add('show');
    } finally {
      bBtn.disabled = false;
      bBtn.textContent = isBrowserRegister ? 'Create account' : 'Sign in';
    }
  });
</script>
</body>
</html>
